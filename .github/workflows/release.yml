name: Build and Release Gomin-UA

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK (Standalone Debug)
        run: |
          chmod +x gradlew
          ./gradlew :TMessagesProj_AppStandalone:assembleAfatDebug -x test

      - name: Delete Old Release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Gomin-UA Latest Build
          files: TMessagesProj_AppStandalone/build/outputs/apk/afat/debug/*.apk
          body: "Автоматична збірка останнього коміту Gomin-UA."
          make_latest: true
